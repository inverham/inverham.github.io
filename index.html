		<script>
			let feeExemption = 0; // 0해당없음 1일부면제 2모두면제
			let peopleType = 0; // 0 본인 1 가족 2 이해관계 
			const certificateArray = [
				{name: "등본", price: 400, feeType: 2},
				{name: "초본", price: 400, feeType: 2}, 
				{name: "전입세대", price: 400, feeType: 2},
				{name: "인감(일반)", price: 600, feeType: 2},
				{name: "인감(부동산)", price: 600, feeType: 2},
				{name: "인감(자동차)", price: 600, feeType: 2},
				{name: "본인서명(일반)", price: 0, feeType: 0},
				{name: "본인서명(부동산)", price: 0, feeType: 0},
				{name: "본인서명(자동차)", price: 0, feeType: 0},
				{name: "가족관계", price: 1000, feeType: 1},
				{name: "기본증명", price: 1000, feeType: 1},
				{name: "혼인관계", price: 1000, feeType: 1},
				{name: "양자입양", price: 1000, feeType: 1},
				{name: "친양자입양", price: 1000, feeType: 1},
				{name: "제적등본", price: 1000, feeType: 1},
				{name: "국세완납", price: 0, feeType: 0},
				{name: "소득금액", price: 0, feeType: 0},
				{name: "사업자등록", price: 0, feeType: 0},
				{name: "과세표준", price: 0, feeType: 0},
				{name: "기타(무료)", price: 0, feeType: 0},
				{name: "토지/임야대장", price: 500, feeType: 0},
				{name: "건축물대장", price: 500, feeType: 0},
				{name: "지적도", price: 700, feeType: 0},
				{name: "농지대장(증지)", price: 500, feeType: 0},
				{name: "세목별(증지)", price: 500, feeType: 0},
				{name: "기타민원", price: 1, feeType: 0},
				{name: "등본", price: 500, feeType: 2},
				{name: "초본", price: 500, feeType: 2},
				{name: "전입세대", price: 500, feeType: 2},
			]; //29개
			let isDisplay = new Array(300);
			let outputArray = new Array(); // 증명번호, 가격, 수량, 위임여부, 완료여부
			const typeToText = ["본인","직계가족","이해관계인"];
			function displayOutput(){
				let totalSum = 0;
				document.getElementById("listDisplay").innerHTML = "";
				for(let i=0; i<outputArray.length; i++){
					if(feeExemption==0 || certificateArray[outputArray[i].no].feeType==0 ||(feeExemption==1 && certificateArray[outputArray[i].no].feeType!=2)){
						outputArray[i].price = outputArray[i].quantity * certificateArray[outputArray[i].no].price;
					}
					else outputArray[i].price = 0;
					totalSum += outputArray[i].price;
					let infoBox = document.createElement("div");
					infoBox.setAttribute("class", "orderInfoBox");
					let infoChecker = document.createElement("div");
					infoChecker.setAttribute("class", "infoChecker");
					infoChecker.innerHTML = "V";
					infoBox.appendChild(infoChecker);
					let infoName = document.createElement("div");
					infoName.setAttribute("class", "infoName");
					infoName.innerHTML = certificateArray[outputArray[i].no].name;
					infoBox.appendChild(infoName);
					let infoType = document.createElement("div");
					infoType.setAttribute("class", "infoType");
					infoType.innerHTML = typeToText[outputArray[i].owner];
					infoBox.appendChild(infoType);
					let infoNum = document.createElement("div");
					infoNum.setAttribute("class", "infoNum");
					infoNum.innerHTML = outputArray[i].quantity+"부";
					infoBox.appendChild(infoNum);
					let infoMoney = document.createElement("div");
					infoMoney.setAttribute("class", "infoMoney");
					infoMoney.innerHTML = outputArray[i].price.toLocaleString()+"원";
					infoBox.appendChild(infoMoney);
					let infoPlus = document.createElement("div");
					infoPlus.setAttribute("class", "infoPlus");
					infoPlus.innerHTML = "+";
					infoBox.appendChild(infoPlus);
					let infoMinus = document.createElement("div");
					infoMinus.setAttribute("class", "infoMinus");
					infoMinus.innerHTML = "-";
					infoBox.appendChild(infoMinus);

					
					document.getElementById("listDisplay").appendChild(infoBox);
				}
				document.getElementById("sumPrice").textContent = totalSum.toLocaleString()+"원";
			}
			function inputCertificate(num){
				if(num<3 && peopleType==2) num+= 26;
				if(isDisplay[peopleType*100+num]==-1){
					isDisplay[peopleType*100+num] = outputArray.length;
					outputArray.push({no:num, price: certificateArray[num].price, quantity:1, owner:peopleType, finish: false});
				}
				else{
					++outputArray[isDisplay[peopleType*100+num]].quantity;
				}
				displayOutput()
			};
			function plusCertificate(outputNum){
				++outputArray[outputNum].quantity;
				displayOutput()
			}
			function minusCertificate(outputNum){
				if(outputArray[outputNum].quantity>1){
					--outputArray[outputNum].quantity;
				}
				else{
					isDisplay[outputArray[outputNum].no + 100*outputArray[outputNum].owner] = -1;
					for(let i=outputNum+1; i<outputArray.length; i++){
						outputArray[i-1] = outputArray[i];
						--isDisplay[outputArray[i].no + 100*outputArray[i].owner];
					}
					outputArray.pop();
				}
				displayOutput()
			}
			function checkCertificate(outputNum){
				outputArray[outputNum].finish = !outputArray[outputNum].finish;
				displayOutput()
			}
			function initIsDisplay(){
				for(let i=0; i<300; i++){
					isDisplay[i] = -1;
				}
			}
			function setFee(feeNum){
				document.getElementById("Exemption"+feeExemption).style.backgroundColor = "rgb(89,89,89)";
				feeExemption = feeNum;
				document.getElementById("Exemption"+feeNum).style.backgroundColor = "rgb(157,92,187)";
				displayOutput()
			}
			function setType(typeNum){
				document.getElementById("type"+peopleType).style.backgroundColor = "rgb(191,191,191)";
				document.getElementById("type"+peopleType).style.color = "rgb(0,0,0)";
				peopleType = typeNum;
				document.getElementById("type"+typeNum).style.backgroundColor = "rgb(89,89,89)";
				document.getElementById("type"+typeNum).style.color = "rgb(255,255,255)";
			}
			function initOutput(){
				initIsDisplay();
				outputArray = new Array();
				setFee(0);
				setType(0);
				displayOutput()
			}
			for(let i=0; i<3; i++){
				document.getElementById("Exemption"+i).addEventListener("click", () => setFee(i));
				document.getElementById("type"+i).addEventListener("click", () => setType(i));
			}
			for(let i=0; i<26; i++){
				document.getElementById("cert"+i).addEventListener("click", () => inputCertificate(i));
			}
			document.getElementById("bottomOK").addEventListener("click", initOutput);
			document.getElementById("bottomDelete").addEventListener("click", initOutput);
			initOutput();

		</script>
	</body>
</html>
