<!DOCTYPE html>
<html>
	<head>
		<title> new project </title>
		<style>
			body{
				background-color: rgb(0,0,0);
				display: flex;
			}

			.rowMenu{
				display: flex;
			}
			.columnMenu{
				overflow-y : auto;
			}
			.columnMenu::-webkit-scrollbar{
				width : 0.5vw;
			}
			.columnMenu::-webkit-scrollbar-track{
				background : transparent;
			}
			.columnMenu::-webkit-scrollbar-button{
				display: none;
			}
			.columnMenu::-webkit-scrollbar-thumb{
				background : #888;
				border-radius: 0.25vw;
			}
			
			.outputPannel{
				background-color : rgb(64,64,64);
				width : 27vw;
				height : 84vh;
				border-radius : 2vw;
				margin : 1vw;
				padding-top : 3vh;
				padding-bottom : 3vh;
				padding-left : 2vw;
				padding-right : 1vw;
			}
			.peopleSelector{
				background-color : rgb(191,191,191);
				width : 6vw;
				height : 4vh;
				border-radius : 2.5vh;
				margin : 0.25vw;
			}
			.peopleAdder{
				background-color : rgb(191,191,191);
				width : 4vh;
				height : 4vh;
				border-radius : 2vh;
				margin : 0.25vw;
			}
			.orderInfoBox{
				width : 26vw;
				height : 10vh;
				background-color : rgb(191,191,191);
				margin-bottom : 2vh;
				border-radius : 5vh;
			}
			.bottomBox{
				width : 8vw;
				height : 6vh;
				border-radius : 3vh;
				margin-right : 1vw;
				display : flex;
				justify-content : center;
				align-items : center;
				font-size : 3vh;
				color : rgb(255,255,255);
			}
			.typeBox{
				width : 7vw;
				height : 4vh;
				border-radius : 2vh;
				margin-right : 0.5vw;
				display : flex;
				justify-content : center;
				align-items : center;
				font-size : 1.7vh;
				background-color : rgb(191,191,191);
				color : rgb(0,0,0);
			}
		</style>
	</head>
	<body>
		<div class = "outputPannel">
			<div class = "rowMenu">
				<div class = "peopleSelector">
				</div>
				<div class = "peopleAdder">
				</div>
			</div>
			<div class = "columnMenu" style = "height : 55vh; margin-top : 1.5vh; margin-bottom : 1.5vh;">
				<div class = "orderInfoBox">
				</div>
			</div>
			<div class = "orderInfoBox">
			</div>
			<div class = "rowMenu" style = "flex-direction : row-reverse">
				<div class = "bottomBox" style = "background-color : rgb(255,0,0)">
					삭제
				</div>
				<div class = "bottomBox" style = "background-color : rgb(50,200,50)">
					확인
				</div>
			</div>
		</div>
		<div style = "margin: 1vw;">
			<div class = "rowMenu">
				<div class = "typeBox">
					본인
				</div>
				<div class = "typeBox">
					직계가족
				</div>
				<div class = "typeBox">
					이해관계
				</div>
			</div>
			<div style = "height : 84vh; width : 60vw; margin-top : 1vw; border : 1px solid rgb(255,255,255) ">
			</div>
		</div>
	</body>
</html>
